default_install_hook_types:
  - pre-commit
  - pre-push
  - commit-msg

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-ast
      - id: debug-statements
        language_version: python3.12
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: no-commit-to-branch
        args:
          - --branch=master
          - --branch=develop
          - --pattern=release/.*

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "--format=screen", "--quiet"]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        files: \.pyi?$
        exclude: ^tests/
        args: [--strict, --pretty, --show-error-codes]
        additional_dependencies:
          - numpy
          - types-requests
          - pydantic
          - pydantic-settings
          - sqlalchemy[mypy]
          - types-redis
          - celery-types
          - fastapi
          - starlette

  - repo: https://github.com/PyCQA/pydocstyle
    rev: 6.3.0          # Check latest stable version
    hooks:
      - id: pydocstyle
        files: \.py$      # Only Python files (adjust if needed)
        exclude: ^tests/  # Optional: skip tests like your mypy hook
        args:
          - --convention=google
          # Optional: fine-tune rules
          # - --ignore=D100,D101,D102,D103,D104,D105,D107  # e.g. allow missing module/class/function docstrings in some cases
          # - --add-ignore=D205,D400,D401                 # ignore specific issues
