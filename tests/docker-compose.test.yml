# tests/docker-compose.test.yml
#
# Ephemeral test infrastructure — started by `make test-integration`,
# torn down after the test run completes.
#
# All ports are fixed (no dynamic TEST_PG_PORT env var needed) because
# `make test-integration` owns the full lifecycle: up → test → down.
# The root conftest connects to the fixed port directly.

services:
  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: melo_test
      POSTGRES_PASSWORD: melo_test
      POSTGRES_DB: melo_test
    ports:
      - "15432:5432"
    command: >
      postgres
        -c max_connections=200
        -c shared_buffers=64MB
        -c idle_in_transaction_session_timeout=0
        -c tcp_keepalives_idle=60
        -c tcp_keepalives_interval=10
        -c tcp_keepalives_count=6
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U melo_test -d melo_test"]
      interval: 2s
      timeout: 2s
      retries: 15

  redis_test:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  minio_test:
    image: minio/minio:RELEASE.2024-05-01T01-11-10Z
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 2s
      retries: 10
    tmpfs:
      - /data
