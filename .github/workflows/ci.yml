name: CI

on:
  push:
    branches:
      - develop
      - master

  pull_request:
    branches:
      - develop
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files --show-diff-on-failure

  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint

    permissions:
      contents: read

    env:
      APP_ENV: test
      DATABASE_URL: "sqlite:///:memory:"
      LOG_LEVEL: warning

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run unit tests
        env:
          COVERAGE_FILE: .coverage.unit-raw
        run: |
          uv run pytest -o addopts='' tests/unit \
            -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage-unit.xml

      - name: Verify coverage file exists
        if: always()
        run: |
          echo "Workspace contents:"
          ls -lah

          echo "Checking for coverage file..."
          test -f .coverage.unit-raw

      - name: Upload unit coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: .coverage.unit-raw
          if-no-files-found: error
          retention-days: 7

  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: lint

    permissions:
      contents: read

    env:
      APP_ENV: test
      LOG_LEVEL: warning
      LOG_FILE_PATH: /tmp/melo-test.log
      DATABASE_URL: postgresql://melo_test:melo_test@localhost:15432/melo_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Start test services
        run: |
          docker compose -f tests/docker-compose.test.yml up -d

          echo "Waiting for Postgres on port 15432..."

          timeout 60 bash -c \
            'until pg_isready -h localhost -p 15432 -U melo_test -q; do
              sleep 2
            done'

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run integration tests
        env:
          COVERAGE_FILE: .coverage.integration-raw
        run: |
          uv run pytest -o addopts='' tests/integration \
            -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage-integration.xml

      - name: Verify coverage file exists
        if: always()
        run: |
          echo "Workspace contents:"
          ls -lah

          echo "Checking for coverage file..."
          test -f .coverage.integration-raw

      - name: Upload integration coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: .coverage.integration-raw
          if-no-files-found: error
          retention-days: 7

      - name: Stop test services
        if: always()
        run: docker compose -f tests/docker-compose.test.yml down -v

  coverage:
    name: Coverage check
    runs-on: ubuntu-latest

    needs:
      - test-unit
      - test-integration

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: artifacts/unit

      - name: Download integration coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-integration
          path: artifacts/integration

      - name: Verify downloaded artifacts
        run: |
          echo "Artifacts:"
          find artifacts -type f

          test -f artifacts/unit/.coverage.unit-raw
          test -f artifacts/integration/.coverage.integration-raw

      - name: Combine coverage
        run: |
          uv run coverage combine \
            artifacts/unit/.coverage.unit-raw \
            artifacts/integration/.coverage.integration-raw

          uv run coverage report --fail-under=80
          uv run coverage xml -o coverage.xml
          uv run coverage html

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: htmlcov
          path: htmlcov
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
