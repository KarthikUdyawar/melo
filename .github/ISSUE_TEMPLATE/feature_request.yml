name: Feature Request
description: Propose a new feature or enhancement
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening, check [Out of Scope](../../CONTRIBUTING.md#out-of-scope) in CONTRIBUTING.md.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? Why does it matter?
      placeholder: "When I have 500+ songs, GET /songs loads everything — I want server-side search."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? API shape, config, behaviour.
      placeholder: |
        Add `?search=<query>` param to GET /songs.
        DB-level ILIKE filter on `title`.
        Return existing envelope shape.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: "Client-side filter — too slow at scale."

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API
        - Worker / Celery
        - Storage / MinIO
        - Downloader / yt-dlp
        - Processor / FFmpeg
        - Database / models
        - Testing / DX
        - Docker / infra
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
