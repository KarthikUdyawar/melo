server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: melo_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: melo
          __path__: /var/log/melo/*.jsonl

    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            event: event
            trace_id: trace_id

      - labels:
          level:
          service:
          event:
          trace_id:
